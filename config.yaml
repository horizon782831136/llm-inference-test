# --- 硬件与环境 ---
hardware_type: p800
workspace: /ssd3/liuwei
xpu_num: 8

# --- 模型 ---
model_name: "Qwen3.5-27B"
model_path: "/ssd3/models/Qwen3.5-27B"
tokenizer_path: "/ssd3/models/Qwen3.5-27B"
model_download_source: ""
model_download_id: ""

# --- 服务镜像 ---
service_image_source: "registry"
service_image_id: "iregistry.baidu-int.com/xpu/infer_qa:v4.0"
service_image_url: ""
service_image_tar_path: ""

# --- 服务容器 ---
service_container_name: "lw_vllm"
service_shared_memory_size: "256g"
service_tmpfs_size: "32g"
service_extra_volumes: ""

# --- 测试镜像 ---
test_image_source: "registry"
test_image_id: "iregistry.baidu-int.com/xpu/infer_qa:v4.0"
test_image_url: ""
test_image_tar_path: ""

# --- 测试容器 ---
test_container_name: "lw_qa_test"
test_shared_memory_size: "256g"
test_tmpfs_size: "32g"
test_extra_volumes: ""

# --- 服务 ---
service_script: "/dir/qwen3.5/qwen3.5-27b/server_v3.sh"
service_port: 30000
service_timeout: 600
service_api_type: "openai"
# reuse_service: false         # 可选: 设为true则沿用当前已运行的服务,跳过启动直接测试

# --- 性能测试 ---
perf_enabled: true
perf_mode: "benchmark"
perf_url: ""
perf_input_len: 2600
perf_output_len: 30
perf_number: 200
perf_temperature: 0.7
perf_rates: "0.3,0.5,0.6,0.7,0.8,1,1.5,2,3,4,5,10,20"
perf_parallels: "3,5,6,7,8,10,15,20,30,40,50,100,200"
perf_single_parallel: 10
perf_single_number: 1000

# --- 精度测试 ---
eval_enabled: true
eval_url: ""
eval_datasets: "aime25,gpqa_diamond,gsm8k,humaneval"
eval_max_tokens: 131072
eval_temperature: 1.0
eval_top_p: 1.0
eval_thinking_mode: "true"
eval_batch_size: 128
judge_api_url: ""
judge_api_key: ""
judge_model_id: ""

# --- 重试 ---
retry_on_anomaly: true
max_retries: 2

# --- 输出 ---
output_dir: "./results"
